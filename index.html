<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#0d0f14">

<title>Lumina</title>

<link rel="manifest" href="./manifest.json">

<link rel="icon" type="image/png" href="./icon-192.png">

<link rel="apple-touch-icon" href="./icon-192.png">

<link rel="stylesheet" href="./style.css">

<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

</head>

<body>

<div id="splash" class="splash">

<div class="splash-logo">

<div class="splash-mark">✦</div>

<h1 class="splash-title">Lumina</h1>

<p class="splash-sub">Your productivity hub</p>

</div>

<div class="splash-loader">

<div class="splash-bar"></div>

</div>

</div>


<header class="topbar">

<div class="topbar-brand">

<span class="topbar-mark">✦</span>

<span class="topbar-name">Lumina</span>

</div>


<div class="topbar-right">

<div id="sync-status" class="sync-status online">

<span class="sync-icon">●</span>

<span class="sync-label">Online</span>

</div>

<button id="sync-btn" class="btn-icon">↻</button>

<button id="settings-btn" class="btn-icon">⚙</button>

</div>

</header>


<main class="main-content">


<section id="agenda-tab" class="tab-content">

<h2 class="tab-title">Agenda</h2>

<div id="agenda-list"></div>

<div id="calendar-container" style="display:none"></div>

<button id="fab-agenda" class="fab">+</button>

</section>


<section id="diary-tab" class="tab-content">

<h2 class="tab-title">Diary</h2>

<div id="diary-list"></div>

<button id="fab-diary" class="fab">+</button>

</section>


<section id="photos-tab" class="tab-content">

<h2 class="tab-title">Photos</h2>

<button id="gallery-upload-btn">Upload</button>

<input type="file" id="gallery-upload-input" accept="image/*" multiple style="display:none">

<div id="gallery-grid"></div>

</section>

</main>


<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>

<script type="module" src="./app.js"></script>

</body>

</html>
